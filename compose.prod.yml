# 本番(リモート VPS / 香橙派)用デプロイ。**このファイルと .env.production の 2 つだけ**
# を置けば動く — pg-tenant 初期化スクリプト / pgbouncer 設定 / userlist は下の
# `configs:` に**インライン**で埋め込んであるので、別ファイルを配る必要がない。
# ビルド不要・justfile 不要。Docker さえあれば OS を問わない。
#
# VPS 側の手順:
#   1) docker login <レジストリ>            # 公開イメージなら不要
#   2) .env.production を用意(.env.example がひな形)
#   3) docker compose --env-file .env.production -f compose.prod.yml up -d
#
# 更新(server だけ・ユーザ app 無瞬断):
#   TSUBOMI_IMAGE=...:vN docker compose --env-file .env.production -f compose.prod.yml up -d server
#       (`just ship` はこれを自動でやる。`up -d`(全 service)ではなく `up -d server` に絞るのが要点 —
#        traefik / pg / valkey などデータ面・入口を巻き込んで再生成せず、全 app の同時瞬断を避ける。)
#
# **infra イメージ(postgres/valkey/traefik/pgbouncer/registry)は multi-arch 索引 digest で固定**。
# こうすると `pull` や `up -d` で勝手に新版へ動かず(= 不意の再生成によるユーザ app 瞬断を防ぎ)、
# どの VPS でも同一の版に収束する。**索引(manifest list)の digest を貼る**ので arm64 / amd64 の
# どちらのホストでも docker が自分のアーキ層を解決する(単一アーキの digest を貼ると arm が壊れる)。
# 更新時(セキュリティ修正など)は新 digest を取って貼り替え、infra の更新だけ別途 `up -d <service>`:
#   docker buildx imagetools inspect postgres:18   # 出力の `Digest:` が索引 digest
#
# 設計: pg-platform は loopback(127.0.0.1:5434)、pg-tenant は loopback(:5435)で
# テナントから隔離。pgbouncer(:6432)が外部入口。server は host ネットワーク。
services:
  pg-platform:
    image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    container_name: tsubomi-pg-platform
    restart: unless-stopped
    # 16GB 共有機向けの控えめなチューニング(元数据小库)。shared_buffers は起動時固定予約なので
    # 小さく抑え、キャッシュは弾力的な OS ページキャッシュに任せる(effective_cache_size はプランナ
    # 提示=メモリ非占有)。max_connections は管制面プール(既定 20)+ 余裕。
    command:
      - postgres
      - -c
      - max_connections=150
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=8MB
    environment:
      POSTGRES_USER: tsubomi
      POSTGRES_PASSWORD: ${PG_PLATFORM_PASSWORD:?set PG_PLATFORM_PASSWORD in .env.production}
      POSTGRES_DB: tsubomi_platform
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pg_platform_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsubomi -d tsubomi_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  # M1:ユーザ DB インスタンス(管制面とは別)。admin は loopback :5435。
  # 初期化スクリプトは下の configs(pgtenant_init)からマウント = 別ファイル不要。
  pg-tenant:
    image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    container_name: tsubomi-pg-tenant
    restart: unless-stopped
    # ユーザ DB の本命チューニング。shared_buffers は固定予約なので控えめ、キャッシュは OS 任せ、
    # effective_cache_size はプランナ提示で索引寄りに(非占有)。NVMe 前提の cost。work_mem は
    # ×接続×並行ソートで効くため保守的に(重い分析クエリは session 単位で都度上げる)。
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_wal_size=2GB
    environment:
      POSTGRES_USER: tsubomi_admin
      POSTGRES_PASSWORD: ${PG_TENANT_PASSWORD:?set PG_TENANT_PASSWORD in .env.production}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pg_tenant_data:/var/lib/postgresql
    configs:
      - source: pgtenant_init
        target: /docker-entrypoint-initdb.d/01-pgbouncer-auth.sh
        mode: 0755
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsubomi_admin -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  # クライアント TLS 用の自己署名証明書を 1 度だけ生成して volume に置く。
  # sslmode=require は証明書を検証しない(LAN・受動的盗聴対策)ので自己署名で十分。
  # postgres:18 を流用(openssl 同梱、別イメージ不要)。鍵は volume 内のみ・git に残さない。
  pgbouncer-certgen:
    image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /tls/server.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -subj "/CN=tsubomi-pgbouncer" \
            -keyout /tls/server.key -out /tls/server.crt
          chmod 644 /tls/server.key /tls/server.crt
          echo "generated self-signed pgbouncer TLS cert"
        fi
    volumes:
      - pgb_tls:/tls
    restart: "no"

  # M1:外部接続入口 + プール。会社 LAN に晒す(送信元制限は iptables DOCKER-USER)。
  # client TLS(sslmode=require)で LAN 上のワイヤを暗号化する。設定 / userlist は
  # 下の configs から。userlist のパスワードは .env から插值され、pgtenant_init が
  # 作るロールと自動で一致する(手動同期は不要)。
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340
    container_name: tsubomi-pgbouncer
    restart: unless-stopped
    depends_on:
      pg-tenant:
        condition: service_healthy
      pgbouncer-certgen:
        condition: service_completed_successfully
    ports:
      - "${PGBOUNCER_BIND_ADDR:-127.0.0.1}:6432:6432"
    volumes:
      - pgb_tls:/etc/pgbouncer/tls:ro
    configs:
      - source: pgbouncer_ini
        target: /etc/pgbouncer/pgbouncer.ini
      - source: pgbouncer_userlist
        target: /etc/pgbouncer/userlist.txt
    # default = pg-tenant への到達。tsubomi-edge = ユーザコンテナが `tsubomi-pgbouncer:6432`
    # (docker DNS)で内部入口に届くため(M3 注入。dev の infra/docker-compose.yml と同じ)。
    networks: [default, tsubomi-edge]

  # M3:ユーザ app イメージの置き場。平台は digest 指定で 127.0.0.1:5000(ループバック・無認証)
  # から pull する。公網 push 入口は traefik 経由(registry.<ドメイン> + basicAuth)で、registry
  # コンテナ自体には認証を付けない(平台のローカル pull を壊さないため)。
  registry:
    image: registry:2@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
    container_name: tsubomi-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"   # registry GC(未参照 blob 削除)のため
      # TLS 終端の前段(traefik / CF tunnel)の後ろにいるので、blob upload の Location を
      # **相対 URL** で返す。これが無いと registry が受信スキーム(http)で絶対 URL を返し、
      # docker push が http:// へ降格 → basicAuth が落ちて 401 になる(本番 push の必須設定)。
      REGISTRY_HTTP_RELATIVEURLS: "true"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - registry_data:/var/lib/registry

  # M5:cache の共有 valkey 実例。per-cache の ACL ユーザは平台(server コンテナ。host ネット +
  # docker.sock)が実行時に ACL SETUSER で足す(揮発 → server が起動時 + 30s で収束。§7.3)。
  # default ユーザは off、平台専用 tsubomi-admin だけが管理権(§11-J)。admin は aclfile では
  # なく command の --user で静的定義(aclfile は ${VAR} 非展開 + 実行時 SETUSER と排他)。
  # 公網 / 会社 LAN には晒さない(§11-B:cache は内部注入のみ)。ホスト側 127.0.0.1:6433 は
  # host ネットの server が admin 接続するため(pg-platform/pgbouncer と同じ loopback 公開)。
  valkey:
    image: valkey/valkey:8-alpine@sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
    container_name: tsubomi-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --maxmemory
      - ${TSUBOMI_VALKEY_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --user
      - default
      - "off"
      - --user
      - tsubomi-admin
      - "on"
      - ">${TSUBOMI_VALKEY_ADMIN_PASS:?set TSUBOMI_VALKEY_ADMIN_PASS in .env.production (英数字のみ)}"
      - "~*"
      - "&*"
      - "+@all"
    ports:
      - "127.0.0.1:6433:6379"
    volumes:
      - valkey_data:/data   # RDB(キー本体。per-cache ACL は平台が収束で貼り直す)
    # default = host ネットの server が 127.0.0.1:6433 で admin 接続。tsubomi-edge = ユーザ
    # コンテナが `tsubomi-valkey:6379`(docker DNS)で内部入口に届くため(§11-A。pgbouncer と同型)。
    networks: [default, tsubomi-edge]

  # M3:ユーザ service / apex / registry の入口 + ルーティング。**file provider のみ**
  # (docker provider は Docker Engine 29 で壊れる)。平台(ホスト直走り)が動的設定を
  # TSUBOMI_TRAEFIK_DYNAMIC_DIR に書き、traefik が watch でホットリロードする:
  # ipallow.yml(ipblock)/ svc-<id>.yml(route.rs)/ registry.yml(registry.rs)/ apex.yml(直VPSのみ)。
  #
  # **既定は HTTP :80 のみ**(上流 = Cloudflare Tunnel / CF proxy / 逆代理が TLS 終端する構成。
  # cloudflared が localhost:80 へ転送し、traefik が Host で振り分ける)。`TSUBOMI_TLS=false` と対。
  # **直 VPS で traefik 自身が :443 + Let's Encrypt** を終端する場合だけ、追加で compose.prod.tls.yml を
  # 重ねる(`-f compose.prod.yml -f compose.prod.tls.yml`)+ `.env` に TSUBOMI_TLS=true / TSUBOMI_ACME_EMAIL。
  # ports は loopback 既定(tunnel は cloudflared が localhost へ来るだけ)。直VPSは TRAEFIK_BIND_ADDR=0.0.0.0。
  traefik:
    image: traefik:v3.5@sha256:16acb89c6db341182970d6fdafece31303b0a380a8ed7aa51682e225229bf1d2
    container_name: tsubomi-traefik
    restart: unless-stopped
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      # CF Tunnel 越しの実 client IP を Cf-Connecting-Ip → X-Forwarded-For に写すローカルプラグイン
      # (リポジトリに vendor:traefik-plugins/src/...)。web 入口に全体適用し、各 service の ipallow
      # より先に走らせる(ipallow の ipStrategy が書き換え後の XFF から実 client を取る)。
      - --experimental.localPlugins.cloudflared-source-ip.moduleName=github.com/kubitodev/traefik-cloudflared-source-ip
      - --entrypoints.web.http.middlewares=cloudflared-source-ip@file
    ports:
      - "${TRAEFIK_BIND_ADDR:-127.0.0.1}:80:80"
    volumes:
      # 平台が書き出すホストパスを read-only でマウント(docker.sock は不要)。
      # TSUBOMI_TRAEFIK_DYNAMIC_DIR(server の env)と一致させること。
      - ${TSUBOMI_TRAEFIK_DYNAMIC_DIR:-/srv/tsubomi/traefik-dynamic}:/etc/traefik/dynamic:ro
      # ローカルプラグイン源(vendor)を /plugins-local へ。Traefik は src/<moduleName>/ を探す。
      - ${TSUBOMI_TRAEFIK_PLUGINS_DIR:-/srv/tsubomi/traefik-plugins}:/plugins-local:ro
    # apex router(直VPS時)の後端 host.docker.internal を host ゲートウェイへ(server は host ネット)。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [default, tsubomi-edge]

  server:
    # 公開イメージ(既定)。別タグにしたいときだけ環境変数 TSUBOMI_IMAGE で上書き。
    image: ${TSUBOMI_IMAGE:-docker.io/wgzhaofumi/tsubomi:v37}
    container_name: tsubomi-server
    restart: unless-stopped
    network_mode: host
    # M6 egress:host netns で iptables(nft)を打ち、テナント容器の出站を遮断する(services/egress.rs)。
    # 既定の cap には NET_ADMIN が無く root でも iptables 不可なので明示追加(docker.sock を既に持つので
    # 相対的に小さな追加)。host netns は network_mode: host で既に共有済み。
    cap_add:
      - NET_ADMIN
    env_file:
      - .env.production
    volumes:
      # M3:平台は docker.sock を保持してユーザコンテナを起動/停止/収束する(bollard)。
      # dev は host 直走りで native に持つが、本番はコンテナなのでホストの sock をマウントする。
      - /var/run/docker.sock:/var/run/docker.sock
      # バックアップ / ゴミ箱 dump をホストに永続化(server は host ネットなので
      # コンテナ内パス = ホストパスで一致。TSUBOMI_BACKUP_DIR / _TRASH_DIR と対応)。
      - /srv/tsubomi:/srv/tsubomi
      # CLI リリース配信:release-cli.sh が公開するホストの release ディレクトリを
      # TSUBOMI_RELEASE_DIR(/srv/releases)へ ro マウント。/api/cli/version を配信。
      - ${TSUBOMI_RELEASES_HOST:-/srv/tsubomi/releases}:/srv/releases:ro
    depends_on:
      pg-platform:
        condition: service_healthy
      pg-tenant:
        condition: service_healthy

# tsubomi-edge は external:平台(bollard)がユーザコンテナを attach する網。compose は参照だけ。
# デプロイ前に一度 `docker network create tsubomi-edge` する(infra/docker-compose.yml と同じ約束)。
networks:
  tsubomi-edge:
    external: true
    name: tsubomi-edge

volumes:
  pg_platform_data:
  pg_tenant_data:
  pgb_tls:
  registry_data:
  valkey_data:
  # traefik_acme(LE 証明書)は直VPS用 compose.prod.tls.yml が足す。

# ===========================================================================
# インライン設定(別ファイルを配らずに済ませるための埋め込み)。
# `$$` は compose の插值回避 ⇒ コンテナ内では `$`(実行時のシェル / SQL の $)。
# `${PGBOUNCER_AUTH_PASSWORD:-...}` は compose が .env から插值する(秘密は env に)。
# 内容は dev の infra/pg-tenant-init/*.sh・infra/pgbouncer/pgbouncer.ini と同一 ——
# どちらか変えたら両方そろえること。
# ===========================================================================
configs:
  pgtenant_init:
    content: |
      #!/bin/bash
      set -e
      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname postgres --set=auth_pw="${PGBOUNCER_AUTH_PASSWORD:?set PGBOUNCER_AUTH_PASSWORD in .env.production (英数字のみ)}" <<'EOSQL'
      CREATE ROLE pgbouncer_auth LOGIN PASSWORD :'auth_pw';
      CREATE OR REPLACE FUNCTION public.pgbouncer_get_auth(p_usename text)
      RETURNS TABLE(usename text, passwd text)
      LANGUAGE sql STABLE SECURITY DEFINER SET search_path = pg_catalog AS
      $$func$$
      SELECT usename::text, passwd::text FROM pg_shadow WHERE usename = p_usename;
      $$func$$;
      REVOKE ALL ON FUNCTION public.pgbouncer_get_auth(text) FROM PUBLIC;
      GRANT EXECUTE ON FUNCTION public.pgbouncer_get_auth(text) TO pgbouncer_auth;
      REVOKE CONNECT ON DATABASE postgres FROM PUBLIC;
      REVOKE CONNECT ON DATABASE template1 FROM PUBLIC;
      GRANT CONNECT ON DATABASE postgres TO pgbouncer_auth;
      EOSQL
  pgbouncer_ini:
    content: |
      [databases]
      * = host=pg-tenant port=5432
      [pgbouncer]
      listen_addr = 0.0.0.0
      listen_port = 6432
      client_tls_sslmode = require
      client_tls_cert_file = /etc/pgbouncer/tls/server.crt
      client_tls_key_file = /etc/pgbouncer/tls/server.key
      auth_type = scram-sha-256
      auth_file = /etc/pgbouncer/userlist.txt
      auth_user = pgbouncer_auth
      auth_dbname = postgres
      auth_query = SELECT usename, passwd FROM public.pgbouncer_get_auth($$1)
      pool_mode = transaction
      max_client_conn = 1000
      default_pool_size = 20
      max_user_connections = 100
      idle_transaction_timeout = 300
      client_idle_timeout = 3600
      server_idle_timeout = 600
      ignore_startup_parameters = extra_float_digits,options
  pgbouncer_userlist:
    content: |
      "pgbouncer_auth" "${PGBOUNCER_AUTH_PASSWORD:?set PGBOUNCER_AUTH_PASSWORD in .env.production (英数字のみ)}"
