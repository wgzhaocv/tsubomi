# 本番(リモート VPS)用デプロイ。下の server.image(公開イメージの既定値)を
# pull して起動するだけ — ビルド不要・justfile 不要・sh 不要。Docker さえあれば
# OS を問わない。
#
# VPS 側の手順(どの VPS でも同じ。このファイルと .env.production を同じ場所に置く):
#   1) docker login <レジストリ>   # 公開イメージなら不要
#   2) .env.production を用意(サーバ設定 + PG_PLATFORM_PASSWORD。.env.example 参照)
#   3) docker compose --env-file .env.production -f compose.prod.yml up -d
#
# デプロイするイメージは server.image の既定値で固定。別タグにしたいときだけ環境変数
# TSUBOMI_IMAGE を上書きする(例 TSUBOMI_IMAGE=...:v2 docker compose ... up -d)。
#
# 設計: pg は loopback(127.0.0.1:5434)バインドでテナントから隔離。server は
# host ネットワークで 127.0.0.1:5434 へ到達し、:9090 をホストに公開する
# (DATABASE_URL=127.0.0.1:5434 が dev/deploy 共通で通る)。
services:
  pg-platform:
    image: postgres:18
    container_name: tsubomi-pg-platform
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsubomi
      POSTGRES_PASSWORD: ${PG_PLATFORM_PASSWORD:?set PG_PLATFORM_PASSWORD in .env.production}
      POSTGRES_DB: tsubomi_platform
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pg_platform_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsubomi -d tsubomi_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  # M1:ユーザ DB インスタンス(管制面とは別)。admin は loopback :5435。
  pg-tenant:
    image: postgres:18
    container_name: tsubomi-pg-tenant
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsubomi_admin
      POSTGRES_PASSWORD: ${PG_TENANT_PASSWORD:?set PG_TENANT_PASSWORD in .env.production}
      POSTGRES_DB: postgres
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD:-tsubomi_pgb_dev}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pg_tenant_data:/var/lib/postgresql
      # 初回起動のみ:pgbouncer auth ロール + pg_shadow 参照関数。ship.sh が同梱する。
      - ./pg-tenant-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsubomi_admin -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  # M1:外部接続入口 + プール。会社 LAN に晒す(送信元制限は iptables DOCKER-USER)。
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: tsubomi-pgbouncer
    restart: unless-stopped
    depends_on:
      pg-tenant:
        condition: service_healthy
    ports:
      - "${PGBOUNCER_BIND_ADDR:-127.0.0.1}:6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro

  server:
    # 公開イメージ(既定)。別タグにしたいときだけ環境変数 TSUBOMI_IMAGE で上書き。
    image: ${TSUBOMI_IMAGE:-docker.io/wgzhaofumi/tsubomi:v1}
    container_name: tsubomi-server
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.production
    volumes:
      # バックアップ / ゴミ箱 dump をホストに永続化(server は host ネットなので
      # コンテナ内パス = ホストパスで一致。TSUBOMI_BACKUP_DIR / _TRASH_DIR と対応)。
      - /srv/tsubomi:/srv/tsubomi
      # CLI リリース配信:release-cli.sh が公開するホストの release ディレクトリを
      # TSUBOMI_RELEASE_DIR(/srv/releases)へ ro マウント。/api/cli/version を配信。
      - ${TSUBOMI_RELEASES_HOST:-/srv/tsubomi/releases}:/srv/releases:ro
    depends_on:
      pg-platform:
        condition: service_healthy
      pg-tenant:
        condition: service_healthy

volumes:
  pg_platform_data:
  pg_tenant_data:
