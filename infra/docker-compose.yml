# tsubomi インフラ層 — IaC(このファイル)が管理し、プラットフォーム自身は触らない。
# プラットフォーム自身の Postgres をプラットフォームが起動することはできない
# (鶏と卵)ため、ここにあるものは
# `docker compose -f infra/docker-compose.yml up -d` で立てる。
#
# 同じファイルが dev の Mac でも本番ホスト(香橙派 arm64 / 将来の x86_64 機)
# でも動く(postgres / pgbouncer / registry / traefik イメージは multi-arch)。
# M3 で traefik + registry + tsubomi-edge 網を追加。後のフェーズで追加:valkey(M5)。
services:
  pg-platform:
    # 管制面メタデータ専用。loopback にバインド:bridge ネットワーク上の
    # ユーザコンテナはホストの 127.0.0.1 に到達できないので、このインスタンスは
    # テナントのワークロードから物理的に隔離される(tech-design §1)。
    image: postgres:18
    container_name: tsubomi-pg-platform
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsubomi
      POSTGRES_PASSWORD: ${PG_PLATFORM_PASSWORD:-tsubomi_dev}
      POSTGRES_DB: tsubomi_platform
    ports:
      # 5434:5432/5433 はローカルの他プロジェクトに取られがちなので。
      - "127.0.0.1:5434:5432"
    volumes:
      # postgres:18 イメージは PGDATA を /var/lib/postgresql/18/docker に置く。
      # バージョン非依存の親ディレクトリをマウントするのが upstream 推奨。
      - pg_platform_data:/var/lib/postgresql

  pg-tenant:
    # ユーザ DB 専用インスタンス(管制面とは別 — 決定 #1:ユーザがここを潰しても
    # 管制面は生きている)。admin 端口は pg-platform と同じく loopback バインド:
    # bridge 上のコンテナはホストの 127.0.0.1 に届かないので、平台だけが
    # 127.0.0.1:5435 で DDL / web SQL のために直結できる。外部入口は pgbouncer。
    image: postgres:18
    container_name: tsubomi-pg-tenant
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsubomi_admin
      POSTGRES_PASSWORD: ${PG_TENANT_PASSWORD:-tsubomi_tenant_dev}
      POSTGRES_DB: postgres
      # 初期化スクリプトが pgbouncer の auth_query 用ロールに付けるパスワード。
      # userlist.txt と一致させること(dev は既定値で揃う)。
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD:-tsubomi_pgb_dev}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pg_tenant_data:/var/lib/postgresql
      # 初回起動時のみ実行(空データディレクトリ時)。pgbouncer auth_query 用の
      # ロール + pg_shadow 参照関数を作る。IaC 層 = 平台は触らない(決定 #6)。
      - ./pg-tenant-init:/docker-entrypoint-initdb.d:ro

  pgbouncer:
    # 外部接続の唯一の入口 + プール。dev は 127.0.0.1:6432 にバインド(本番の
    # CIDR 制限は iptables の DOCKER-USER で行う — compose では絞らない)。
    # auth_query で pg_shadow を都度引くので、DB / ロールを動的に作っても
    # pgbouncer の再読込は不要(rotate も即反映)。
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: tsubomi-pgbouncer
    restart: unless-stopped
    depends_on:
      - pg-tenant
    ports:
      # dev は loopback。本番(香橙派など)は会社 LAN から届くよう
      # PGBOUNCER_BIND_ADDR=0.0.0.0 にし、送信元制限は iptables DOCKER-USER で行う(§1)。
      - "${PGBOUNCER_BIND_ADDR:-127.0.0.1}:6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    # default = pg-tenant への到達。tsubomi-edge = M3 のユーザコンテナが
    # `tsubomi-pgbouncer:6432`(docker DNS)で内部入口に届くため(m3-design §3.4 / §7.2)。
    networks: [default, tsubomi-edge]

  registry:
    # M3:ユーザ app イメージの置き場。平台は digest 指定で 127.0.0.1:5000 から pull する
    # (決定 #3。localhost は docker が insecure registry として許すので証明書不要)。
    # 本番の push 入口(registry.<ドメイン> + basic auth、traefik 終端)は後チャンクで足す。
    image: registry:2
    container_name: tsubomi-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"   # registry GC のため(未参照 blob を消せる)
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - registry_data:/var/lib/registry

  valkey:
    # M5:cache の共有実例。per-cache の ACL ユーザは平台(ホスト直走り)が実行時に
    # ACL SETUSER で足す(揮発 → server が起動時 + 30s で収束。doc/paas-m5-design.md §7.3)。
    # default ユーザは off、平台専用 tsubomi-admin だけが管理権(§11-J)。admin は aclfile では
    # なく command の --user で静的定義する(aclfile は ${VAR} を展開しないため。compose が展開)。
    # この方式なら実行時 ACL SETUSER も使える(aclfile と inline user は排他なので aclfile は使わない)。
    # maxmemory + allkeys-lru で整機を守る(cache は本質的に易失。§3)。
    image: valkey/valkey:8-alpine      # 公式・multi-arch(arm64+amd64。香橙派 OK)
    container_name: tsubomi-valkey
    restart: unless-stopped
    # --user は username 以降の各トークンを規則として読む。YAML 上 ~ & + > * は行頭で特殊なので
    # 引用する。${...} は compose が插值する(.env の TSUBOMI_VALKEY_ADMIN_PASS。dev は既定値)。
    command:
      - valkey-server
      - --maxmemory
      - ${TSUBOMI_VALKEY_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --user
      - default
      - "off"
      - --user
      - tsubomi-admin
      - "on"
      - ">${TSUBOMI_VALKEY_ADMIN_PASS:-tsubomi_valkey_dev}"
      - "~*"
      - "&*"
      - "+@all"
    ports:
      # 平台(ホスト直走り)が admin 接続で ACL を発行するため loopback で公開(pg-tenant と同型)。
      # **ホスト側は 6433**:6379 はローカルの redis/valkey に取られがちなので(pg の 5434/5435 と同じ
      # 衝突回避)。コンテナ内は 6379 のまま = ユーザコンテナの docker DNS 注入(tsubomi-valkey:6379)は不変。
      # 外部(公網 / 会社 CIDR)入口は無い(§11-B:cache は内部注入のみ)。
      - "127.0.0.1:6433:6379"
    volumes:
      - valkey_data:/data                # RDB(キー本体。per-cache ACL は平台が収束で貼り直す)
    # default = 平台からの loopback 到達。tsubomi-edge = M3 のユーザコンテナが
    # `tsubomi-valkey:6379`(docker DNS)で内部入口に届くため(§11-A。pgbouncer と同型)。
    networks: [default, tsubomi-edge]

  traefik:
    # M3:ユーザ service の入口 + ルーティング。**file provider のみ**(docker provider は使わない)。
    # 平台(ホスト直走り)が動的設定をここに書き、watch で即時ホットリロードする:会社 IP 許可
    # リストの middleware(ipallow.yml、ipblock)+ 各 service の router/service(svc-<id>.yml、
    # services/route.rs)。router はその middleware を <tsubomi-ipallow>@file で参照する。
    # docker API を一切触らないので Docker Engine 29(最小 API 1.40。古い traefik の docker
    # クライアントが 1.24 に落ちて弾かれ provider が全コンテナを見失う問題)を回避できる。後端へは
    # コンテナ名 tsubomi-<id> を edge 網の docker DNS で解決して到達する(名前解決は provider と別)。
    # dev は :80 を 8088 に publish、ホスト名は <subdomain>.localhost。本番の :443+LE は後チャンク。
    image: traefik:v3.5
    container_name: tsubomi-traefik
    restart: unless-stopped
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "${TRAEFIK_BIND_ADDR:-127.0.0.1}:8088:80"
    volumes:
      # 平台が書き出すホストパスを read-only でマウント(docker.sock は不要)。
      # TSUBOMI_TRAEFIK_DYNAMIC_DIR(server の env)と一致させること。dev は .env で /tmp 配下、
      # compose は db-up が --env-file .env で同じ値を読む。
      - ${TSUBOMI_TRAEFIK_DYNAMIC_DIR:-/srv/tsubomi/traefik-dynamic}:/etc/traefik/dynamic:ro
    networks: [default, tsubomi-edge]

# tsubomi-edge は external:平台(bollard)がユーザコンテナを attach する網。compose は
# 参照するだけ。初回は justfile の db-up が `docker network create tsubomi-edge` する。
networks:
  tsubomi-edge:
    external: true
    name: tsubomi-edge

volumes:
  pg_platform_data:
  pg_tenant_data:
  registry_data:
  valkey_data:
