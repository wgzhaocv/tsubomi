; tsubomi pgbouncer — ユーザ DB(pg-tenant)への外部接続入口 + プール。
; edoburu/pgbouncer の entrypoint はこのファイルが存在する限り上書きしない
; (`if [ ! -f pgbouncer.ini ]`)ので、ここに書いたものがそのまま使われる。

[databases]
; ワイルドカード:任意の DB 名をそのまま pg-tenant の同名 DB へ中継する。
; 平台が db_<shortid> を動的に作っても、ここを編集する必要がない。
* = host=pg-tenant port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; auth_query:接続毎に pg_shadow を引く ⇒ ロールを動的に作っても再読込不要。
; auth_user(pgbouncer_auth)自身の資格情報だけ userlist.txt に置く。
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = pgbouncer_auth
; lookup 関数は postgres DB にしか無いので、auth_query は常にそこで実行する
; (pg_shadow はクラスタ全体なので 1 つの DB から全ロールを引ける)。
auth_dbname = postgres
auth_query = SELECT usename, passwd FROM public.pgbouncer_get_auth($1)

; トランザクションプール:多数の短命接続(app)向け。
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20

; 容量加固(capacity-valid-connections):合法だが管理されない接続が共有枠を食い潰さない様に。
; per-(pg ロール)= per-租户 のクライアント接続上限。1 租户が共有 max_client_conn(1000)を独占不可。
; 会社は NAT 共有出口なので「送信元 IP 毎」ではなく「ロール毎」で効くのが要(会社全体を 1 枠にしない)。
; 利用者少数想定 = あえて高め(偶の重利用を縛らない)。共有 1000 ÷ 100 ≈ 10 租户が同時上限まで張れる。
max_user_connections = 100
; idle-in-transaction(開けっ放しの事務、ほぼバグ。後端+ロックを占有)を 5 分で切る。
idle_transaction_timeout = 300
; 放置クライアント接続を 1h で回収(健全なプールの空闲接続を殺さない様、大きめ)。
client_idle_timeout = 3600
; 後端の空闲接続を回収(既定 600 だが明示)。
server_idle_timeout = 600

; クライアント(psql / sqlx / ORM)が送る無害な起動パラメータを黙って受ける。
ignore_startup_parameters = extra_float_digits,options
